services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: anivault
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: anivault
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  nestjs:
    image: ${ECR_REGISTRY}/anivault-nestjs:latest
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: ${CORS_ORIGIN}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: anivault
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: anivault
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  nextjs:
    image: ${ECR_REGISTRY}/anivault-nextjs:latest
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEST_INTERNAL_URL: http://nestjs:3001
    depends_on:
      - nestjs
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data: